name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev,analytics-demo]'
      - name: Lint (ruff)
        run: ruff check src tests demos/analytics/src
      - name: Format (ruff)
        run: ruff format --check src tests demos/analytics/src
      - name: Types (mypy)
        run: mypy
      - name: Tests (pytest)
        run: pytest -q
